# mise environment for senbay-rs.
#
# Quick start:
#   mise install            # install pinned tools (rust, cargo-llvm-cov)
#   mise run setup          # toolchain components + libclang wiring (for `video`)
#   mise run test           # cargo test
#   mise run coverage       # C0 line coverage (default features)
#   mise run test-video     # cargo test --features video
#   mise run coverage-video # C0 line coverage incl. the video feature
#
# After `mise run setup` once, a plain `cargo run --features video` works too:
# setup writes the libclang paths into .cargo/config.toml, which cargo applies
# to every build (including the opencv crate's build script).
#
# System prerequisites (the system OpenCV the `opencv` crate links against and
# the libclang its binding generator parses headers with):
#   macOS:  installed automatically by `mise run setup` via Homebrew
#           (opencv, llvm, pkg-config); Homebrew itself must already be present.
#   Linux:  install once with apt (needs sudo, so it is not automated):
#             sudo apt install libopencv-dev llvm-18 libclang-18-dev clang-18

[tools]
rust = "1.95"
"cargo:cargo-llvm-cov" = "0.8.7"

[tasks.setup]
description = "Install llvm-tools and wire libclang into .cargo/config.toml for the video feature"
run = """
set -eu
rustup component add llvm-tools-preview >/dev/null 2>&1 || true

root="$MISE_PROJECT_ROOT"

if [ "$(uname -s)" = "Darwin" ]; then
  # Install the system prerequisites via Homebrew (no sudo needed). Only the
  # missing formulae are installed, so re-runs are cheap.
  if command -v brew >/dev/null 2>&1; then
    for f in opencv llvm pkg-config; do
      brew list "$f" >/dev/null 2>&1 || { echo "installing $f via brew..."; brew install "$f"; }
    done
  else
    echo "warning: Homebrew not found. Install it from https://brew.sh, then" >&2
    echo "         re-run, or install opencv/llvm/pkg-config manually." >&2
  fi

  # macOS: find an LLVM that ships libclang.dylib together with a matching clang.
  # Point at the real lib dir (not a symlink) so the dylib's own @rpath resolves.
  libdir=""; clang=""
  for prefix in \
      "$(brew --prefix llvm 2>/dev/null || true)" \
      "$(brew --prefix 2>/dev/null || true)/opt/llvm" \
      "$(xcode-select -p 2>/dev/null || true)/Toolchains/XcodeDefault.xctoolchain/usr" \
      "/Library/Developer/CommandLineTools/usr"; do
    [ -n "$prefix" ] || continue
    if [ -e "$prefix/lib/libclang.dylib" ]; then
      libdir="$prefix/lib"
      [ -x "$prefix/bin/clang" ] && clang="$prefix/bin/clang"
      break
    fi
  done
  [ -n "$clang" ] || clang="$(xcrun -f clang 2>/dev/null || command -v clang || true)"
  if [ -z "$libdir" ]; then
    echo "error: libclang.dylib not found. Install LLVM, e.g.: brew install llvm" >&2
    exit 1
  fi
  mkdir -p "$root/.cargo"
  {
    echo "# Generated by mise run setup for the video feature. Gitignored; do not edit."
    echo "[env]"
    echo "LIBCLANG_PATH = \\"$libdir\\""
    echo "DYLD_FALLBACK_LIBRARY_PATH = \\"$libdir\\""
    [ -n "$clang" ] && echo "CLANG_PATH = \\"$clang\\""
  } > "$root/.cargo/config.toml"
  echo "macOS: libclang at $libdir${clang:+, clang at $clang}"
else
  # Linux: clang-sys wants a file literally named libclang.so, but distros often
  # ship only libclang-18.so.1, so shim a correctly-named symlink into .mise.
  dest="$root/.mise/libclang"
  mkdir -p "$dest"
  libdir="$(llvm-config-18 --libdir 2>/dev/null || echo /usr/lib/llvm-18/lib)"
  src=""
  for cand in "$libdir/libclang.so" "$libdir"/libclang-18.so.* "$libdir"/libclang.so.*; do
    [ -e "$cand" ] && src="$cand" && break
  done
  [ -n "$src" ] || src="$(find /usr/lib /usr/lib64 -name 'libclang*.so*' 2>/dev/null | grep -v cpp | sort -V | tail -1)"
  if [ -z "$src" ]; then
    echo "error: libclang not found. Install, e.g.: sudo apt install llvm-18 libclang-18-dev clang-18" >&2
    exit 1
  fi
  ln -sfn "$src" "$dest/libclang.so"
  clang="$(command -v clang-18 || echo /usr/bin/clang-18)"
  mkdir -p "$root/.cargo"
  {
    echo "# Generated by mise run setup for the video feature. Gitignored; do not edit."
    echo "[env]"
    echo "LIBCLANG_PATH = \\"$dest\\""
    echo "CLANG_PATH = \\"$clang\\""
  } > "$root/.cargo/config.toml"
  echo "Linux: libclang shim $dest/libclang.so -> $src"
fi
echo "wrote $root/.cargo/config.toml"
"""

[tasks.test]
description = "Run the test suite (default features)"
run = "cargo test"

[tasks.test-video]
description = "Run the test suite with the video feature"
depends = ["setup"]
run = "cargo test --features video"

[tasks.coverage]
description = "C0 line coverage (default features)"
run = "cargo llvm-cov"

[tasks.coverage-video]
description = "C0 line coverage including the video feature (OpenCV backend excluded)"
depends = ["setup"]
run = 'cargo llvm-cov --features video --ignore-filename-regex "video_backend\.rs"'
